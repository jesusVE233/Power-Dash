<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Power Dash: Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; color: white; z-index: 10; font-weight: bold; pointer-events: none; }
        .time-critical { color: #ff0000; font-size: 1.8rem !important; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        .overlay { position: absolute; background: rgba(0, 0, 0, 0.95); width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; text-align: center; color: white; padding: 25px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        button { pointer-events: auto; background: #ff3f34; border: none; padding: 15px 45px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 1.2rem; color: white; border-bottom: 4px solid #b32d26; width: 80%; }
        
        #action-btn { 
            position: absolute; bottom: 40px; right: 30px; width: 90px; height: 90px; 
            background: rgba(255, 63, 52, 0.3); border: 4px solid #ff3f34; border-radius: 50%; 
            color: #ff3f34; display: flex; justify-content: center; align-items: center; 
            font-weight: bold; pointer-events: auto; visibility: hidden; z-index: 15;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .leaderboard-table { width: 100%; max-width: 300px; border-collapse: collapse; margin-top: 15px; color: white; }
        .score-col { color: #00ff88; text-align: right; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">
            <div id="timer-display" style="font-size: 1.3rem;">10.0s</div>
            <div id="score-display" style="font-size: 1.3rem;">PESAS: 0</div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 style="color:#ff3f34; font-size: 3rem;">POWER DASH</h1>
            <p>MODO HARDCORE</p>
            <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-left: 4px solid #ff3f34; font-size: 0.9rem;">
                • Tiempo: <b>10s iniciales</b><br>
                • Bono: <b>+5s</b> por pesa<br>
                • Cuidado: ¡No choques!
            </div>
            <button onclick="startGame()">¡DALE!</button>
        </div>

        <div id="action-btn">E</div>

        <div id="end-screen" class="overlay hidden">
            <h1>FIN DEL TIEMPO</h1>
            <div style="font-size: 2.5rem; color: #ff3f34; font-weight: bold;" id="final-score">0</div>
            <table class="leaderboard-table" id="leaderboard">
            </table>
            <button onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 450,
            height: 800,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload, create, update }
        };

        let game = new Phaser.Game(config);
        let player, activeWeight, machines, people, rackZone;
        let isHolding = null, isPlaying = false, timeLeft = 10.0, score = 0, rackCount = 0;
        let cursors, keyE;
        
        // Variables Joystick
        let joystickBase, joystickThumb, joystickActive = false, joystickVector = { x: 0, y: 0 };

        function preload() {
            const g = this.make.graphics({ x: 0, y: 0, add: false });
            // Personaje
            g.fillStyle(0x00d2ff).fillCircle(15, 15, 15).lineStyle(2, 0xffffff).strokeCircle(15, 15, 15);
            g.generateTexture('player', 32, 32);
            // Pesa
            g.clear().fillStyle(0xffffff).fillRect(0, 10, 30, 10).fillStyle(0x555555).fillRect(0, 0, 8, 30).fillRect(22, 0, 8, 30);
            g.generateTexture('weight', 32, 32);
            // Enemigo
            g.clear().fillStyle(0xff3f34).fillCircle(15, 15, 15).fillStyle(0x000000).fillCircle(10, 10, 2).fillCircle(20, 10, 2);
            g.generateTexture('person', 32, 32);
            // Maquina
            g.clear().fillStyle(0x1a1a1a).fillRoundedRect(0, 0, 80, 50, 5).lineStyle(2, 0x333333).strokeRect(0, 0, 80, 50);
            g.generateTexture('machine', 82, 52);
        }

        function create() {
            this.add.rectangle(225, 400, 450, 800, 0x0a0a0a);
            this.add.grid(225, 400, 450, 800, 50, 50, 0x222222, 0.1);

            rackZone = this.add.rectangle(225, 60, 390, 70).setStrokeStyle(2, 0xff3f34);
            this.add.rectangle(225, 60, 410, 90, 0x1a1a1a).setDepth(-1);
            
            machines = this.physics.add.staticGroup();
            // Posiciones fijas de las máquinas
            [[80, 250], [370, 250], [225, 450], [80, 650], [370, 650]].forEach(p => machines.create(p[0], p[1], 'machine'));

            player = this.physics.add.sprite(225, 750, 'player').setCollideWorldBounds(true).setCircle(14);
            
            // Crear pesa fuera de pantalla y luego posicionarla bien
            activeWeight = this.physics.add.sprite(-100, -100, 'weight');
            spawnWeight();

            people = this.physics.add.group();
            for(let i=0; i<4; i++) {
                let pos = getValidSpawn(false); // Obtener posición segura
                let p = people.create(pos.x, pos.y, 'person');
                p.setCollideWorldBounds(true).setBounce(1).setCircle(14);
            }

            // COLISIONES
            this.physics.add.collider(player, machines);
            this.physics.add.collider(people, machines);
            
            // NUEVO: Los enemigos chocan entre sí para no encimarse
            this.physics.add.collider(people, people);

            this.physics.add.collider(player, people, () => {
                if (isHolding) {
                    isHolding = null;
                    timeLeft = Math.max(0, timeLeft - 2); // Penalización
                    this.cameras.main.shake(200, 0.02);
                }
            });

            // Controles PC
            cursors = this.input.keyboard.createCursorKeys();
            keyE = this.input.keyboard.addKey('E');

            // --- JOYSTICK PARA MÓVIL ---
            const isMobile = !this.sys.game.device.os.desktop;
            if (isMobile) {
                joystickBase = this.add.circle(80, 700, 50, 0xffffff, 0.1).setDepth(100);
                joystickThumb = this.add.circle(80, 700, 25, 0xff3f34, 0.5).setDepth(101);
                
                this.input.on('pointerdown', (p) => {
                    if (p.x < 225) { 
                        joystickActive = true;
                        joystickBase.setPosition(p.x, p.y);
                        joystickThumb.setPosition(p.x, p.y);
                    }
                });

                this.input.on('pointermove', (p) => {
                    if (joystickActive) {
                        let dist = Phaser.Math.Distance.Between(p.x, p.y, joystickBase.x, joystickBase.y);
                        let angle = Phaser.Math.Angle.Between(joystickBase.x, joystickBase.y, p.x, p.y);
                        dist = Math.min(dist, 50);
                        joystickThumb.setPosition(joystickBase.x + Math.cos(angle)*dist, joystickBase.y + Math.sin(angle)*dist);
                        joystickVector = { x: Math.cos(angle) * (dist/50), y: Math.sin(angle) * (dist/50) };
                    }
                });

                this.input.on('pointerup', () => {
                    joystickActive = false;
                    joystickVector = { x: 0, y: 0 };
                    joystickThumb.setPosition(joystickBase.x, joystickBase.y);
                });
            }

            const interact = () => {
                if (!isPlaying) return;
                if (isHolding) {
                    if (Phaser.Geom.Rectangle.Contains(rackZone.getBounds(), player.x, player.y)) {
                        score++; 
                        timeLeft += 5; // CAMBIO: +5 Segundos
                        rackCount++;
                        this.add.sprite(45 + (rackCount % 12) * 32, rackCount < 12 ? 50 : 75, 'weight').setScale(0.6).setAlpha(0.4).setTint(0xff3f34);
                        isHolding = null; 
                        spawnWeight();
                    } else { isHolding = null; }
                } else if (Phaser.Math.Distance.Between(player.x, player.y, activeWeight.x, activeWeight.y) < 60) {
                    isHolding = activeWeight;
                }
            };

            const actionBtn = document.getElementById('action-btn');
            actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); interact(); });
            keyE.on('down', interact);

            this.scene.pause();
        }

        // NUEVA FUNCIÓN: Busca posición segura lejos de máquinas y zona de inicio
        function getValidSpawn(checkPlayer = false) {
            let x, y, valid;
            let safetyLoops = 0;
            do {
                valid = true;
                x = Phaser.Math.Between(50, 400);
                y = Phaser.Math.Between(200, 700);
                
                // 1. No muy cerca del Rack (zona roja arriba)
                if (Phaser.Math.Distance.Between(x, y, 225, 60) < 150) valid = false;

                // 2. Si es para enemigo, no aparecer encima del jugador
                if (checkPlayer && player && Phaser.Math.Distance.Between(x, y, player.x, player.y) < 100) valid = false;

                // 3. No aparecer ENCIMA de ninguna máquina
                machines.children.iterate(m => {
                    if (Phaser.Math.Distance.Between(x, y, m.x, m.y) < 60) valid = false;
                });

                safetyLoops++;
            } while (!valid && safetyLoops < 100);
            return { x, y };
        }

        function spawnWeight() {
            let pos = getValidSpawn(false);
            activeWeight.setPosition(pos.x, pos.y);
        }

        function update(time, delta) {
            if (!isPlaying) return;
            timeLeft -= delta / 1000;
            
            let enemySpeed = Math.min(100 + (score * 9), 270);
            let pSpeed = 240;

            // Movimiento
            let vx = 0, vy = 0;
            if (cursors.left.isDown) vx = -pSpeed; else if (cursors.right.isDown) vx = pSpeed;
            if (cursors.up.isDown) vy = -pSpeed; else if (cursors.down.isDown) vy = pSpeed;

            if (joystickActive) {
                vx = joystickVector.x * pSpeed;
                vy = joystickVector.y * pSpeed;
            }
            player.setVelocity(vx, vy);

            people.children.iterate(p => {
                let d = Phaser.Math.Distance.Between(p.x, p.y, player.x, player.y);
                if (d < 150 + (score*5)) this.physics.moveToObject(p, player, enemySpeed);
            });

            if (isHolding) isHolding.setPosition(player.x, player.y);

            document.getElementById('timer-display').innerText = Math.max(0, timeLeft).toFixed(1) + "s";
            document.getElementById('score-display').innerText = `PESAS: ${score}`;
            
            if (timeLeft <= 4) document.getElementById('timer-display').classList.add('time-critical');
            else document.getElementById('timer-display').classList.remove('time-critical');

            const btn = document.getElementById('action-btn');
            let isNear = Phaser.Math.Distance.Between(player.x, player.y, activeWeight.x, activeWeight.y) < 60;
            btn.style.visibility = (isNear || isHolding) ? 'visible' : 'hidden';
            btn.innerText = isHolding ? 'DEJAR' : 'TOMAR';

            if (timeLeft <= 0) gameOver();
        }

        function gameOver() {
            isPlaying = false;
            game.scene.scenes[0].scene.pause();
            document.getElementById('final-score').innerText = score;
            
            // Cambio de clave de guardado a PowerDash
            let highScores = JSON.parse(localStorage.getItem('powerDashScores') || '[]');
            highScores.push(score);
            highScores.sort((a, b) => b - a);
            highScores = highScores.slice(0, 5);
            localStorage.setItem('powerDashScores', JSON.stringify(highScores));

            document.getElementById('leaderboard').innerHTML = `
                <tr><th>POS</th><th>RECORD</th><th>SCORE</th></tr>
                ${highScores.map((s, i) => `<tr><td>#${i+1}</td><td>MEJOR</td><td class="score-col">${s}</td></tr>`).join('')}
            `;
            document.getElementById('end-screen').classList.remove('hidden');
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            isPlaying = true;
            game.scene.scenes[0].scene.resume();
        }
    </script>
</body>
</html>
